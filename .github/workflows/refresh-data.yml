name: Refresh data

# Manual, on-demand refresh of the live market data without a full rebuild. Pulls
# fresh figures, commits them, and purges the jsDelivr cache so the deployed site
# (which fetches market.json from that CDN at runtime) reflects them promptly. The
# weekly auto-refresh still rides the Deploy workflow's cron.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Share the deploy workflow's group so a data push here never races a deploy push.
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      # Needed to commit the refreshed data + history back to the repo.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull fresh market data
        run: npm run fetch-data

      - name: Commit refreshed data
        # Resilient push: if another run lands first, rebase and retry instead of
        # hard-failing, and never block the cache purge below.
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/market.json src/data/history.json src/data/locations.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Refresh market data (manual)"
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
                && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "push attempt ${attempt} failed, retrying..."
            sleep 5
          done
          echo "could not push after 3 attempts"

      - name: Purge jsDelivr cache
        # Best-effort: let the CDN serve the new market.json (the only file fetched
        # live) without waiting out its TTL. Never fail the run over a flaky purge.
        continue-on-error: true
        run: curl -fsS "https://purge.jsdelivr.net/gh/swhitt/breakeven@main/src/data/market.json" || true
